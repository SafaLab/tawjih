<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الموجّهون | متابعة التوجيه</title>
<script>
  (function () {
    var t = localStorage.getItem("tawjih_theme");
    document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
  })();
</script>
<link rel="stylesheet" href="../assets/css/main.css" />
<link rel="stylesheet" href="../assets/css/components.css" />
<link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>

<div class="app-shell">
  <div class="sidebar-backdrop"></div>
  <aside class="sidebar">
    <div class="brand">
      <span class="emoji">🏫</span>
      <div>
        <h2>متابعة التوجيه</h2>
        <p>إدارة غرب القاهرة</p>
      </div>
    </div>

    <nav class="nav-list">
      <a class="nav-item" href="supervisor-dashboard.html"><span class="emoji">📊</span> النظرة العامة</a>
      <a class="nav-item active" href="supervisor-members.html"><span class="emoji">🧑‍🏫</span> الموجّهون</a>
      <a class="nav-item" href="supervisor-tasks.html"><span class="emoji">📋</span> المهام</a>
    </nav>

    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar" id="userAvatar">؟</div>
        <div class="info">
          <p id="userName">—</p>
          <p id="userRole">—</p>
        </div>
      </div>
      <button class="btn btn-secondary btn-block btn-sm" id="logoutBtn">🚪 تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div><button class="menu-toggle">☰</button></div>
      <div>
        <h1>🧑‍🏫 الموجّهون</h1>
        <p>أضف موجّهيك وتابع نشاطهم</p>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="تبديل الثيم"></button>
        <button class="btn btn-primary" id="addMemberBtn">➕ إضافة موجّه</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="🔍 ابحث بالاسم أو المدرسة" style="min-width:240px" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الهاتف</th>
              <th>عدد المهام</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="membersBody"></tbody>
        </table>
      </div>

      <div class="empty-state hidden" id="emptyState">
        <span class="emoji">🧑‍🏫</span>
        لسه ما ضفتش موجّهين، دوس "إضافة موجّه" عشان تبدأ
      </div>
    </div>
  </main>
</div>

<!-- مودال إضافة/تعديل موجّه -->
<div class="modal-overlay" id="memberModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">إضافة موجّه جديد ➕</h3>
      <button class="modal-close" data-close-modal>✕</button>
    </div>
    <form id="memberForm">
      <div class="field">
        <label>👤 الاسم بالكامل</label>
        <input type="text" id="mName" required placeholder="مثال: أحمد محمد علي" />
      </div>
      <div class="field">
        <label>🏫 المدرسة</label>
        <input type="text" id="mSchool" placeholder="اسم المدرسة" />
      </div>
      <div class="field">
        <label>📱 رقم الهاتف</label>
        <input type="tel" id="mPhone" placeholder="01xxxxxxxxx" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-close-modal>إلغاء</button>
        <button type="submit" class="btn btn-primary" id="saveMemberBtn">💾 حفظ</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="../assets/js/supervisor/members.js"></script>
<script type="module">
  import { initTheme, bindThemeToggle } from "../assets/js/theme.js";
  initTheme();
  bindThemeToggle(document.getElementById("themeToggle"));
</script>
<script>
  document.querySelector(".menu-toggle")?.addEventListener("click", () => {
    document.querySelector(".sidebar").classList.add("open");
    document.querySelector(".sidebar-backdrop").classList.add("show");
  });
  document.querySelector(".sidebar-backdrop")?.addEventListener("click", () => {
    document.querySelector(".sidebar").classList.remove("open");
    document.querySelector(".sidebar-backdrop").classList.remove("show");
  });
</script>
</body>
</html>
