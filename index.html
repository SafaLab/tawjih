<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول | منصة متابعة التوجيه</title>
<script>
  (function () {
    var t = localStorage.getItem("tawjih_theme");
    document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
  })();
</script>
<link rel="stylesheet" href="assets/css/main.css" />
<style>
/* ===== Login Page Polish ===== */
.login-bg {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  padding: 24px;
}

/* Canvas الخلفية المتحركة */
#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  box-shadow: 0 20px 60px rgba(20,30,60,0.12), 0 4px 16px rgba(20,30,60,0.06);
  animation: slideUp .4s cubic-bezier(.16,1,.3,1);
}

[data-theme="dark"] .login-card {
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.2);
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.login-card-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 28px 28px 0 0;
  background: var(--gradient);
}

.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.login-icon-wrap {
  width: 80px; height: 80px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(46,111,242,0.12), rgba(124,58,237,0.12));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 38px;
  border: 1.5px solid rgba(46,111,242,0.2);
}

.login-header h1 {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -.3px;
}

.login-header p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

.login-field { margin-bottom: 18px; }

.login-field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.login-input-wrap { position: relative; }

.login-input-wrap .input-icon {
  position: absolute;
  top: 50%; right: 14px;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
  opacity: .5;
}

.login-input-wrap input {
  width: 100%;
  padding: 13px 42px 13px 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  transition: border-color .2s, box-shadow .2s;
  box-sizing: border-box;
  font-family: inherit;
}

.login-input-wrap input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(46,111,242,0.12);
}

.login-input-wrap input::placeholder { color: var(--text-faint); }

.login-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: var(--gradient);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  margin-top: 8px;
  font-family: inherit;
  letter-spacing: .2px;
}
.login-btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
.login-btn:active:not(:disabled) { transform: translateY(0); }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }

.login-error {
  background: var(--danger-bg);
  border: 1px solid rgba(224,57,75,.25);
  color: var(--danger);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
  display: none;
  animation: shake .3s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.login-footer::before, .login-footer::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.theme-btn-login {
  position: absolute;
  top: 16px; left: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: background .2s;
  color: var(--text);
}
.theme-btn-login:hover { background: var(--card-hover); }

.btn-spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="loader" class="app-loader">
  <div class="spinner"></div>
  <span>جاري التحقق من الجلسة...</span>
</div>

<div class="login-bg hidden" id="authScreen">
  <div class="login-card">
    <div class="login-card-top"></div>

    <button class="theme-btn-login" id="themeToggle" aria-label="تبديل الثيم"></button>

    <div class="login-header">
      <div class="login-icon-wrap">🏫</div>
      <h1>منصة متابعة التوجيه</h1>
      <p>إدارة غرب القاهرة التعليمية<br>توجيه الصحافة</p>
    </div>

    <div class="login-error" id="authError"></div>

    <div class="login-field">
      <label for="email">البريد الإلكتروني</label>
      <div class="login-input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="email" placeholder="example@domain.com" autocomplete="email" required />
      </div>
    </div>

    <div class="login-field">
      <label for="password">كلمة المرور</label>
      <div class="login-input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
    </div>

    <button class="login-btn" id="loginBtn">تسجيل الدخول</button>

    <div class="login-footer">الحسابات تُضاف من المدير العام فقط</div>
  </div>
</div>

<script>
// ===== خلفية متحركة ناعمة — تتكيف مع الـ dark/light mode =====
(function () {
  const canvas = document.getElementById("bgCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");

  let W, H, particles = [], animId;
  const COUNT = 28;

  // قراءة لون الخلفية من CSS variable
  function getBgColor() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue("--primary").trim() || "#2E6FF2";
  }

  function hexToRgb(hex) {
    hex = hex.replace("#", "");
    if (hex.length === 3) hex = hex.split("").map(h => h + h).join("");
    const n = parseInt(hex, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomParticle() {
    return {
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     Math.random() * 80 + 30,        // نصف قطر: 30–110px
      vx:    (Math.random() - 0.5) * 0.25,   // سرعة أفقية ناعمة
      vy:    (Math.random() - 0.5) * 0.18,   // سرعة رأسية ناعمة
      alpha: Math.random() * 0.06 + 0.02,    // شفافية: 2%–8% (هادية جداً)
      phase: Math.random() * Math.PI * 2,    // للتنفس (نبض خفي)
      speed: Math.random() * 0.008 + 0.003,  // سرعة النبض
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: COUNT }, randomParticle);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const rgb = hexToRgb(getBgColor());
    // لون ثاني - بنفسجي ناعم
    const rgb2 = { r: 124, g: 58, b: 237 };

    particles.forEach((p, i) => {
      // نبض ناعم
      p.phase += p.speed;
      const pulsedR = p.r * (0.92 + 0.08 * Math.sin(p.phase));
      const pulsedA = p.alpha * (0.8 + 0.2 * Math.sin(p.phase + 1));

      // تبديل اللون بين الأزرق والبنفسجي حسب الـ index
      const { r, g, b } = i % 3 === 0 ? rgb2 : rgb;

      // gradient داخل الدائرة (أكثر نعومة)
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pulsedR);
      grad.addColorStop(0, `rgba(${r},${g},${b},${pulsedA})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);

      ctx.beginPath();
      ctx.arc(p.x, p.y, pulsedR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // حركة
      p.x += p.vx;
      p.y += p.vy;

      // ارتداد ناعم من الحواف (مش اختفاء مفاجئ)
      if (p.x < -p.r)   p.x = W + p.r;
      if (p.x > W + p.r) p.x = -p.r;
      if (p.y < -p.r)   p.y = H + p.r;
      if (p.y > H + p.r) p.y = -p.r;
    });

    animId = requestAnimationFrame(draw);
  }

  // إيقاف الـ animation لو الصفحة مش ظاهرة (توفير battery)
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      cancelAnimationFrame(animId);
    } else {
      draw();
    }
  });

  window.addEventListener("resize", () => {
    resize();
    particles.forEach(p => {
      if (p.x > W) p.x = Math.random() * W;
      if (p.y > H) p.y = Math.random() * H;
    });
  });

  // مراقبة تغيير الثيم لتحديث الألوان تلقائياً
  const observer = new MutationObserver(() => {
    // الألوان بتتحدث تلقائياً لأننا بنقرأ من CSS var في كل frame
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  init();
  draw();
})();
</script>

<script type="module">
  import { login, redirectByRole, getUserProfile } from "./assets/js/auth.js";
  import { auth, onAuthStateChanged } from "./assets/js/firebase-config.js";
  import { initTheme, bindThemeToggle } from "./assets/js/theme.js";

  initTheme();
  bindThemeToggle(document.getElementById("themeToggle"));

  const loader    = document.getElementById("loader");
  const authScreen = document.getElementById("authScreen");
  const errorBox  = document.getElementById("authError");
  const loginBtn  = document.getElementById("loginBtn");
  const emailIn   = document.getElementById("email");
  const passIn    = document.getElementById("password");

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const profile = await getUserProfile(user.uid);
      if (profile) { redirectByRole(profile); return; }
    }
    loader.classList.add("hidden");
    authScreen.classList.remove("hidden");
  });

  function setLoading(on) {
    loginBtn.disabled = on;
    loginBtn.innerHTML = on
      ? `جاري الدخول <span class="btn-spinner"></span>`
      : "تسجيل الدخول";
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
    errorBox.style.animation = "none";
    requestAnimationFrame(() => errorBox.style.animation = "shake .3s ease");
  }

  loginBtn.addEventListener("click", async () => {
    const email    = emailIn.value.trim();
    const password = passIn.value;
    if (!email || !password) { showError("برجاء إدخال البريد الإلكتروني وكلمة المرور"); return; }

    errorBox.style.display = "none";
    setLoading(true);

    try {
      const user    = await login(email, password);
      const profile = await getUserProfile(user.uid);
      if (!profile) throw { code: "no-profile" };
      redirectByRole(profile);
    } catch (err) {
      const msgs = {
        "auth/invalid-credential":  "البريد الإلكتروني أو كلمة المرور غير صحيحة",
        "auth/user-not-found":      "لا يوجد حساب بهذا البريد",
        "auth/wrong-password":      "كلمة المرور غير صحيحة",
        "auth/too-many-requests":   "محاولات كثيرة — انتظر قليلاً ثم حاول مجدداً",
        "auth/invalid-email":       "صيغة البريد الإلكتروني غير صحيحة",
        "no-profile":               "الحساب غير مُفعّل، تواصل مع المدير العام",
      };
      showError(msgs[err.code] || "حدث خطأ غير متوقع، يرجى المحاولة مجدداً");
      setLoading(false);
    }
  });

  // Enter key
  [emailIn, passIn].forEach(el =>
    el.addEventListener("keydown", e => { if (e.key === "Enter") loginBtn.click(); })
  );
</script>
</body>
</html>
