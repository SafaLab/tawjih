<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول | منصة متابعة التوجيه</title>
<script>
  (function () {
    var t = localStorage.getItem("tawjih_theme");
    document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
  })();
</script>
<link rel="stylesheet" href="assets/css/main.css" />
<style>
/* ===== Login Page Polish ===== */
.login-bg {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  padding: 24px;
}

/* دوائر خلفية زخرفية */
.login-bg::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(46,111,242,0.08) 0%, transparent 70%);
  top: -200px; right: -150px;
  pointer-events: none;
}
.login-bg::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  box-shadow: 0 20px 60px rgba(20,30,60,0.12), 0 4px 16px rgba(20,30,60,0.06);
  animation: slideUp .4s cubic-bezier(.16,1,.3,1);
}

[data-theme="dark"] .login-card {
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.2);
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.login-card-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 28px 28px 0 0;
  background: var(--gradient);
}

.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.login-icon-wrap {
  width: 80px; height: 80px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(46,111,242,0.12), rgba(124,58,237,0.12));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 38px;
  border: 1.5px solid rgba(46,111,242,0.2);
}

.login-header h1 {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -.3px;
}

.login-header p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

.login-field {
  margin-bottom: 18px;
}

.login-field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.login-input-wrap {
  position: relative;
}

.login-input-wrap .input-icon {
  position: absolute;
  top: 50%; right: 14px;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
  opacity: .5;
}

.login-input-wrap input {
  width: 100%;
  padding: 13px 42px 13px 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  transition: border-color .2s, box-shadow .2s;
  box-sizing: border-box;
  font-family: inherit;
}

.login-input-wrap input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(46,111,242,0.12);
}

.login-input-wrap input::placeholder { color: var(--text-faint); }

.login-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: var(--gradient);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  margin-top: 8px;
  font-family: inherit;
  letter-spacing: .2px;
}
.login-btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
.login-btn:active:not(:disabled) { transform: translateY(0); }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }

.login-error {
  background: var(--danger-bg);
  border: 1px solid rgba(224,57,75,.25);
  color: var(--danger);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
  display: none;
  animation: shake .3s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.login-footer::before, .login-footer::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.theme-btn-login {
  position: absolute;
  top: 16px; left: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: background .2s;
  color: var(--text);
}
.theme-btn-login:hover { background: var(--card-hover); }

/* Spinner داخل الزرار */
.btn-spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader" class="app-loader">
  <div class="spinner"></div>
  <span>جاري التحقق من الجلسة...</span>
</div>

<div class="login-bg hidden" id="authScreen">
  <div class="login-card">
    <div class="login-card-top"></div>

    <button class="theme-btn-login" id="themeToggle" aria-label="تبديل الثيم"></button>

    <div class="login-header">
      <div class="login-icon-wrap">🏫</div>
      <h1>منصة متابعة التوجيه</h1>
      <p>إدارة غرب القاهرة التعليمية<br>توجيه الصحافة</p>
    </div>

    <div class="login-error" id="authError"></div>

    <div class="login-field">
      <label for="email">البريد الإلكتروني</label>
      <div class="login-input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="email" placeholder="example@domain.com" autocomplete="email" required />
      </div>
    </div>

    <div class="login-field">
      <label for="password">كلمة المرور</label>
      <div class="login-input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
    </div>

    <button class="login-btn" id="loginBtn">تسجيل الدخول</button>

    <div class="login-footer">الحسابات تُضاف من المدير العام فقط</div>
  </div>
</div>

<script type="module">
  import { login, redirectByRole, getUserProfile } from "./assets/js/auth.js";
  import { auth, onAuthStateChanged } from "./assets/js/firebase-config.js";
  import { initTheme, bindThemeToggle } from "./assets/js/theme.js";

  initTheme();
  bindThemeToggle(document.getElementById("themeToggle"));

  const loader    = document.getElementById("loader");
  const authScreen = document.getElementById("authScreen");
  const errorBox  = document.getElementById("authError");
  const loginBtn  = document.getElementById("loginBtn");
  const emailIn   = document.getElementById("email");
  const passIn    = document.getElementById("password");

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const profile = await getUserProfile(user.uid);
      if (profile) { redirectByRole(profile); return; }
    }
    loader.classList.add("hidden");
    authScreen.classList.remove("hidden");
  });

  function setLoading(on) {
    loginBtn.disabled = on;
    loginBtn.innerHTML = on
      ? `جاري الدخول <span class="btn-spinner"></span>`
      : "تسجيل الدخول";
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
    errorBox.style.animation = "none";
    requestAnimationFrame(() => errorBox.style.animation = "shake .3s ease");
  }

  loginBtn.addEventListener("click", async () => {
    const email    = emailIn.value.trim();
    const password = passIn.value;
    if (!email || !password) { showError("برجاء إدخال البريد الإلكتروني وكلمة المرور"); return; }

    errorBox.style.display = "none";
    setLoading(true);

    try {
      const user    = await login(email, password);
      const profile = await getUserProfile(user.uid);
      if (!profile) throw { code: "no-profile" };
      redirectByRole(profile);
    } catch (err) {
      const msgs = {
        "auth/invalid-credential":  "البريد الإلكتروني أو كلمة المرور غير صحيحة",
        "auth/user-not-found":      "لا يوجد حساب بهذا البريد",
        "auth/wrong-password":      "كلمة المرور غير صحيحة",
        "auth/too-many-requests":   "محاولات كثيرة — انتظر قليلاً ثم حاول مجدداً",
        "auth/invalid-email":       "صيغة البريد الإلكتروني غير صحيحة",
        "no-profile":               "الحساب غير مُفعّل، تواصل مع المدير العام",
      };
      showError(msgs[err.code] || "حدث خطأ غير متوقع، يرجى المحاولة مجدداً");
      setLoading(false);
    }
  });

  // Enter key
  [emailIn, passIn].forEach(el =>
    el.addEventListener("keydown", e => { if (e.key === "Enter") loginBtn.click(); })
  );
</script>
</body>
</html>
